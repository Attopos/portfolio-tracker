name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run deploy script on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SERVER_DIR: ${{ secrets.VPS_SERVER_DIR }}
          VPS_SERVER_RESTART_CMD: ${{ secrets.VPS_SERVER_RESTART_CMD }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${VPS_APP_DIR}' SERVER_DIR='${VPS_SERVER_DIR}' SERVER_RESTART_CMD='${VPS_SERVER_RESTART_CMD}' BRANCH='main' bash -s" \
            < scripts/deploy.sh
